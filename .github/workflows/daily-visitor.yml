name: Daily visitor increment

on:
  schedule:
    # GitHub Actions uses UTC. 17:05 UTC is 00:05 in Jakarta (WIB).
    - cron: "5 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  increment-visitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Increment the Supabase visitor counter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_URL and SUPABASE_ANON_KEY repository secrets are required."
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "${SUPABASE_URL%/}/rest/v1/rpc/increment_visitor" \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --header "Content-Type: application/json" \
            --data '{"p_page_key":"home"}'
